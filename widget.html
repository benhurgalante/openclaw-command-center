<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClaw Agent Chat — Live Monitor</title>
<style>
  :root {
    --bg-primary: #0d1117;
    --bg-secondary: #161b22;
    --bg-tertiary: #21262d;
    --border: #30363d;
    --text-primary: #e6edf3;
    --text-secondary: #8b949e;
    --accent-cyan: #58a6ff;
    --accent-green: #3fb950;
    --accent-magenta: #bc8cff;
    --accent-yellow: #d29922;
    --accent-red: #f85149;
    --accent-orange: #d18616;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    background: var(--bg-primary);
    color: var(--text-primary);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  header h1 {
    font-size: 14px;
    font-weight: 600;
    color: var(--accent-cyan);
  }

  header h1 span { color: var(--text-secondary); font-weight: 400; }

  .status-bar {
    display: flex;
    gap: 16px;
    font-size: 11px;
    color: var(--text-secondary);
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 4px;
  }

  .status-dot.online { background: var(--accent-green); }
  .status-dot.offline { background: var(--accent-red); }

  .chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .message {
    max-width: 85%;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.5;
    position: relative;
  }

  .message.sent {
    align-self: flex-end;
    background: #0d419d;
    border: 1px solid #1f6feb;
  }

  .message.received {
    align-self: flex-start;
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
  }

  .message .meta {
    font-size: 10px;
    color: var(--text-secondary);
    margin-bottom: 4px;
    display: flex;
    justify-content: space-between;
    gap: 12px;
  }

  .message .meta .agent { font-weight: 600; }
  .message.sent .meta .agent { color: var(--accent-green); }
  .message.received .meta .agent { color: var(--accent-magenta); }

  .message .content {
    white-space: pre-wrap;
    word-break: break-word;
  }

  .enforcement-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    margin-top: 6px;
  }

  .enforcement-badge.accept { background: #0d2818; color: var(--accent-green); border: 1px solid #238636; }
  .enforcement-badge.retry { background: #2d1b00; color: var(--accent-yellow); border: 1px solid #9e6a03; }
  .enforcement-badge.escalate { background: #3d0a0a; color: var(--accent-red); border: 1px solid #da3633; }

  .metrics-bar {
    background: var(--bg-secondary);
    border-top: 1px solid var(--border);
    padding: 8px 20px;
    display: flex;
    gap: 24px;
    font-size: 11px;
    color: var(--text-secondary);
  }

  .metric { display: flex; align-items: center; gap: 6px; }
  .metric .value { color: var(--accent-cyan); font-weight: 600; }

  .input-bar {
    background: var(--bg-secondary);
    border-top: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    gap: 8px;
  }

  .input-bar select {
    background: var(--bg-tertiary);
    color: var(--text-primary);
    border: 1px solid var(--border);
    padding: 8px 12px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 12px;
  }

  .input-bar input {
    flex: 1;
    background: var(--bg-tertiary);
    color: var(--text-primary);
    border: 1px solid var(--border);
    padding: 8px 12px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 12px;
    outline: none;
  }

  .input-bar input:focus { border-color: var(--accent-cyan); }

  .input-bar button {
    background: #238636;
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    font-weight: 600;
  }

  .input-bar button:hover { background: #2ea043; }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    color: var(--text-secondary);
    gap: 8px;
  }

  .empty-state .icon { font-size: 48px; opacity: 0.3; }
  .empty-state p { font-size: 13px; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg-primary); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <h1>OpenClaw Agent Chat <span>— Live Monitor</span></h1>
  <div class="status-bar">
    <span><span class="status-dot online" id="ws-status"></span> <span id="connection-text">Conectando...</span></span>
    <span id="msg-count">0 mensagens</span>
    <span id="last-update">—</span>
  </div>
</header>

<div class="chat-container" id="chat">
  <div class="empty-state" id="empty-state">
    <div class="icon">🦞</div>
    <p>Aguardando mensagens entre agentes...</p>
    <p style="font-size:11px">Conectando ao agent-chat-server (porta 18790)</p>
  </div>
</div>

<div class="metrics-bar">
  <div class="metric">Agentes ativos: <span class="value" id="active-agents">0</span></div>
  <div class="metric">Mensagens hoje: <span class="value" id="total-msgs">0</span></div>
  <div class="metric">Enforcement: <span class="value" id="enforcement-count">0</span></div>
  <div class="metric">Escalacoes: <span class="value" id="escalation-count">0</span></div>
</div>

<div class="input-bar">
  <select id="agent-select">
    <option value="maestro">maestro</option>
    <option value="sysdev">sysdev</option>
    <option value="coder">coder</option>
    <option value="clawdev">clawdev</option>
    <option value="designer">designer</option>
    <option value="sentinel">sentinel</option>
    <option value="scout">scout</option>
    <option value="finance">finance</option>
    <option value="analyst">analyst</option>
    <option value="flow">flow</option>
    <option value="ops">ops</option>
    <option value="briefer">briefer</option>
    <option value="ads">ads</option>
    <option value="sales">sales</option>
    <option value="copywriter">copywriter</option>
    <option value="hr">hr</option>
    <option value="juris">juris</option>
    <option value="cio">cio</option>
  </select>
  <input type="text" id="msg-input" placeholder="Enviar mensagem ao agente..." />
  <button id="send-btn" onclick="sendMessage()">Enviar</button>
</div>

<script>
const chatEl = document.getElementById('chat');
const emptyState = document.getElementById('empty-state');
let ws = null;
let msgCount = 0;
let enforcementCount = 0;
let escalationCount = 0;
const activeAgents = new Set();

function connect() {
  ws = new WebSocket('ws://localhost:18790');

  ws.onopen = () => {
    document.getElementById('ws-status').className = 'status-dot online';
    document.getElementById('connection-text').textContent = 'Conectado';
  };

  ws.onclose = () => {
    document.getElementById('ws-status').className = 'status-dot offline';
    document.getElementById('connection-text').textContent = 'Desconectado';
    setTimeout(connect, 3000);
  };

  ws.onerror = () => {
    document.getElementById('ws-status').className = 'status-dot offline';
    document.getElementById('connection-text').textContent = 'Offline — fallback polling';
    setTimeout(connect, 5000);
    fallbackPoll();
  };

  ws.onmessage = (event) => {
    const data = JSON.parse(event.data);
    if (data.type === 'chat') {
      addMessage(data);
    } else if (data.type === 'enforcement') {
      addEnforcement(data);
    } else if (data.type === 'bulk') {
      data.messages.forEach(addMessage);
    }
  };
}

function addMessage(msg) {
  if (emptyState) emptyState.style.display = 'none';

  const div = document.createElement('div');
  div.className = `message ${msg.direction || 'received'}`;

  const agent = msg.sender || 'unknown';
  const target = msg.target || '';
  const time = msg.timestamp || new Date().toLocaleTimeString('pt-BR');
  const content = (msg.content || '').substring(0, 2000);

  activeAgents.add(agent);
  if (target) activeAgents.add(target);

  div.innerHTML = `
    <div class="meta">
      <span class="agent">${agent} → ${target}</span>
      <span>${time}</span>
    </div>
    <div class="content">${escapeHtml(content)}</div>
  `;

  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;

  msgCount++;
  updateMetrics();
}

function addEnforcement(data) {
  enforcementCount++;
  if (data.decision === 'escalate') escalationCount++;

  const badge = document.createElement('div');
  badge.className = `enforcement-badge ${data.decision}`;
  badge.textContent = `🛡️ ${data.decision.toUpperCase()} — ${data.agent} (${data.reason_code})`;
  chatEl.appendChild(badge);
  chatEl.scrollTop = chatEl.scrollHeight;

  updateMetrics();
}

function updateMetrics() {
  document.getElementById('active-agents').textContent = activeAgents.size;
  document.getElementById('total-msgs').textContent = msgCount;
  document.getElementById('enforcement-count').textContent = enforcementCount;
  document.getElementById('escalation-count').textContent = escalationCount;
  document.getElementById('msg-count').textContent = `${msgCount} mensagens`;
  document.getElementById('last-update').textContent = new Date().toLocaleTimeString('pt-BR');
}

function sendMessage() {
  const agent = document.getElementById('agent-select').value;
  const input = document.getElementById('msg-input');
  const msg = input.value.trim();
  if (!msg) return;

  addMessage({
    sender: 'ben',
    target: agent,
    content: msg,
    direction: 'sent',
    timestamp: new Date().toLocaleTimeString('pt-BR')
  });

  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ action: 'send', agent, message: msg }));
  }

  input.value = '';
}

function fallbackPoll() {
  fetch('http://localhost:18790/api/chats')
    .then(r => r.json())
    .then(data => {
      if (data.messages) data.messages.forEach(addMessage);
    })
    .catch(() => {});
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

document.getElementById('msg-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendMessage();
});

connect();
</script>
</body>
</html>
